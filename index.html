<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.Y.S.T.E.M. F.A.I.L.U.R.E.</title>
    <style>
        :root {
            --bg-viewport: #060608;
            --bg-card: #0c0c0f;
            --border-muted: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --accent-yellow: #facc15;
            --accent-glow: rgba(250, 204, 21, 0.5);
            --glitch-red: rgba(255, 0, 80, 0.7);
            --glitch-blue: rgba(0, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-viewport);
            color: var(--text-main);
            font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
            animation: scanline 8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        .cyber-card {
            width: 100%;
            max-width: 680px;
            background: var(--bg-card);
            border-radius: 4px;
            position: relative;
            padding: 4px;
            overflow: hidden;
            box-shadow: 0 0 50px -10px rgba(0,0,0,0.8);
            transform: translateY(20px) scale(0.95);
            opacity: 0;
            animation: cardEntrance 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards 0.2s;
        }

        .cyber-card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--accent-yellow), transparent 30%);
            animation: rotateBorder 4s linear infinite;
            z-index: 1;
        }

        .card-inner {
            background: var(--bg-card);
            border-radius: 2px;
            padding: 50px 40px;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .card-inner::before, .card-inner::after {
            content: "{} [] // 01";
            position: absolute;
            font-size: 10px;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            pointer-events: none;
        }
        .card-inner::before { top: 10px; left: 10px; animation: particlesFloat 20s linear infinite; }
        .card-inner::after { bottom: 10px; right: 10px; animation: particlesFloat 15s linear infinite reverse; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-yellow);
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border: 1px solid var(--accent-yellow);
            margin-bottom: 30px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .badge-icon {
            animation: flickerIcon 1.5s infinite;
        }

        h1.glitch {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        h1.glitch::before, h1.glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-card);
        }

        h1.glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-red);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitchAnim 3s infinite linear alternate-reverse;
        }

        h1.glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--glitch-blue);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitchAnim2 2s infinite linear alternate-reverse;
        }

        .scramble-date {
            color: var(--accent-yellow);
            font-weight: 500;
            text-shadow: 0 0 15px var(--accent-glow);
            position: relative;
        }

        .footer-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-muted);
            font-size: 13px;
            margin-top: 20px;
        }

        .timer-label { color: #8b8b93; }
        .timer-value {
            color: var(--accent-yellow);
            animation: timerPulse 2s infinite;
        }

        @keyframes rotateBorder { to { transform: rotate(360deg); } }
        @keyframes scanline { to { top: 100%; } }
        @keyframes particlesFloat {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(100px, -50px) rotate(360deg); opacity: 0; }
        }
        @keyframes cardEntrance { to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes flickerIcon { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } 52% { opacity: 1; } 54% { opacity: 0.2; } 55% { opacity: 1; } }
        @keyframes glitchAnim { 0% { clip: rect(31px, 999px, 39px, 0); transform: skew(0.5turn); } 100% { clip: rect(4px, 999px, 10px, 0); transform: skew(0.1turn); } }
        @keyframes glitchAnim2 { 0% { clip: rect(91px, 999px, 99px, 0); transform: skew(0.2turn); } 100% { clip: rect(2px, 999px, 10px, 0); transform: skew(0.6turn); } }
        @keyframes timerPulse { 0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--accent-glow); } 50% { opacity: 0.6; text-shadow: 0 0 5px var(--accent-glow); } }

        @media (max-width: 500px) { h1.glitch { font-size: 26px; } .card-inner { padding: 30px 20px; } }
    </style>
</head>
<body>

    <div class="cyber-card">
        <div class="card-inner">
            <div class="badge">
                <span class="badge-icon">⚠️</span>
                <span>ответы на экзамен по физике</span>
            </div>
            
            <h1 class="glitch" data-text="ТЕХНИЧЕСКИЕ РАБОТЫ ДО">
                ТЕХНИЧЕСКИЕ РАБОТЫ ДО <br>
                <span class="scramble-date" id="scramble-target">24.06.2026 14:00</span>
            </h1>

            <div class="footer-panel">
                <span class="timer-label">Доступ откроется через:</span>
                <span class="timer-value" id="live-timer">вычисление...</span>
            </div>
        </div>
    </div>

    <script>
        function scrambleText(element) {
            const finalText = element.textContent;
            const chars = '0123456789/?_-%$@#!XYZ';
            const duration = 40;
            let currentIteration = 0;

            const interval = setInterval(() => {
                element.textContent = finalText
                    .split('')
                    .map((char, index) => {
                        if (index < currentIteration) return char;
                        if (char === ' ' || char === '.') return char;
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join('');

                if (currentIteration >= finalText.length) {
                    clearInterval(interval);
                    element.textContent = finalText;
                }
                currentIteration += finalText.length / 50;
            }, duration);
        }

        function initCountdown() {
            // Установлено: 24 июня 2026 года, 14:00
            const targetDate = new Date(2026, 5, 24, 14, 0, 0).getTime();
            const timerElement = document.getElementById('live-timer');

            function tick() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    timerElement.style.color = '#61c554';
                    timerElement.style.textShadow = 'none';
                    timerElement.textContent = 'Доступ открыт';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                const pad = (num) => String(num).padStart(2, '0');
                timerElement.textContent = `${days}д : ${pad(hours)}ч : ${pad(minutes)}м : ${pad(seconds)}с`;
            }

            tick();
            setInterval(tick, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            scrambleText(document.getElementById('scramble-target'));
            initCountdown();
        });
    </script>
</body>
</html>
