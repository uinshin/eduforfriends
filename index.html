<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.Y.S.T.E.M. F.A.I.L.U.R.E.</title>
    <style>
        :root {
            --bg-viewport: #060608;
            --bg-card: #0c0c0f;
            --border-muted: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --accent-yellow: #facc15;
            --accent-glow: rgba(250, 204, 21, 0.5);
            --glitch-red: rgba(255, 0, 80, 0.7);
            --glitch-blue: rgba(0, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-viewport);
            color: var(--text-main);
            font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
            animation: scanline 8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        .cyber-card {
            width: 100%;
            max-width: 680px;
            background: var(--bg-card);
            border-radius: 4px;
            position: relative;
            padding: 4px;
            overflow: hidden;
            box-shadow: 0 0 50px -10px rgba(0,0,0,0.8);
            transform: translateY(20px) scale(0.95);
            opacity: 0;
            animation: cardEntrance 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards 0.2s;
        }

        .cyber-card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--accent-yellow), transparent 30%);
            animation: rotateBorder 4s linear infinite;
            z-index: 1;
        }

        .card-inner {
            background: var(--bg-card);
            border-radius: 2px;
            padding: 50px 40px;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .card-inner::before, .card-inner::after {
            content: "{} [] // 01";
            position: absolute;
            font-size: 10px;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            pointer-events: none;
        }
        .card-inner::before { top: 10px; left: 10px; animation: particlesFloat 20s linear infinite; }
        .card-inner::after { bottom: 10px; right: 10px; animation: particlesFloat 15s linear infinite reverse; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-yellow);
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border: 1px solid var(--accent-yellow);
            margin-bottom: 30px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .badge-icon {
            animation: flickerIcon 1.5s infinite;
        }

        h1.glitch {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        h1.glitch::before, h1.glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-card);
        }

        h1.glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-red);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitchAnim 3s infinite linear alternate-reverse;
        }

        h1.glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--glitch-blue);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitchAnim
